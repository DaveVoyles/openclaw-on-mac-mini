# OpenClaw E2E Test Queries
#
# Each entry defines one test case fired via `openclaw ask`.
# Add new tests by appending entries — no runner changes needed.
#
# Fields:
#   id        (required) — unique slug, used in output and --id filter
#   question  (required) — the exact prompt sent to `openclaw ask`
#   expect    (optional) — validation rules (all optional; non_empty + no_error always checked)
#     non_empty  : true (default) — response must not be blank
#     no_error   : true (default) — response must not contain error/unavailable/refused
#     min_words  : N — response body must contain at least N words
#     has_table  : true — response must contain a markdown table (lines with |)
#     paragraphs : N — response must contain at least N paragraph breaks
#     keywords   : [list] — at least ONE keyword must appear (case-insensitive)
#     model      : name — "Metadata:" line in footer must contain this string

- id: box-office-weekend
  question: >
    Show me box office results for the previous weekend. Have 1 paragraph for each of the
    top 5 films. Then, create a table which indicates: 1. Title 2. BO results this week
    3. Last week 4. % change WoW 5. Total
  expect:
    non_empty: true
    no_error: true
    min_words: 150
    has_table: true
    paragraphs: 4
    keywords:
      - Mario
      - Hail Mary
      - Tuscany
      - Drama
      - Hoppers
      - box office
      - weekend

- id: lacrosse-d1-schedule
  question: >
    Show me the upcoming men's division 1 college lacrosse games this week.
    Give me a table indicating: 1. Teams and ranking 2. Time 3. Where/how to watch
  expect:
    non_empty: true
    no_error: true
    min_words: 50
    # NOTE: has_table and team keywords are intentionally omitted —
    # schedule data is time-sensitive and tables only appear when structured data is available.
    keywords:
      - lacrosse

- id: wwe-raw-recap
  question: >
    Give me a recap of the past week's WWE Monday Night RAW. Indicate which city it was in,
    and which city is next. Highlight if there is anything we should be paying attention to
    for the upcoming Smackdown episode. For each match: 1. Create a title and bold the
    wrestler's names 2. Write 2 paragraphs indicating the outcome and why we should care.
    Bold the key words.
  expect:
    non_empty: true
    no_error: true
    min_words: 200
    paragraphs: 4
    # NOTE: specific wrestlers, cities, and show results change weekly —
    # only stable structural keywords checked.
    keywords:
      - RAW
      - WWE
      - SmackDown
      - match

- id: house-listings-delco
  question: >
    Give me house listings in the Broomall or Upper Darby/Havertown area which meet the
    following criteria: Price range $250k-$400k, Property taxes less than $8k annually,
    Home size 1000-2000 sq ft. Include a link to the property listing so I can view it myself.
  expect:
    non_empty: true
    no_error: true
    min_words: 80
    # NOTE: Real estate listings change daily — has_table omitted since inventory
    # varies and the model may respond with narrative when no structured data is found.
    # Stable geographical keywords used instead of specific addresses.
    keywords:
      - Broomall
      - Havertown
      - Upper Darby
