# Pre-commit hooks for OpenClaw
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Ruff - Fast Python linter (replaces flake8, isort, etc.)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix]
      # Run the formatter
      - id: ruff-format

  # MyPy - Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        name: mypy type checking
        args: [--config-file=pyproject.toml, --follow-imports=silent]
        additional_dependencies:
          - types-aiofiles
          - types-PyYAML
          - types-requests
        # Only check files explicitly configured in pyproject.toml
        files: ^src/(config|digest_manager|trend_tracker|openclaw_types)\.py$
        pass_filenames: false
        always_run: true

  # Bandit - Security linting
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -r, src/]
        additional_dependencies: ["bandit[toml]"]

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^tests/fixtures/
      - id: end-of-file-fixer
        exclude: ^tests/fixtures/
      - id: check-yaml
        exclude: ^templates/
      - id: check-added-large-files
        args: [--maxkb=10000]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
        exclude: ^\.env\.example$
      - id: check-ast
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: debug-statements
      - id: mixed-line-ending
        args: [--fix=lf]

  # YAML formatting
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.15.0
    hooks:
      - id: pretty-format-yaml
        args: [--autofix, --indent, "2"]
        exclude: ^(\.github/|docker-compose\.yml)

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: [--fix, --disable, MD013, MD033, MD041]

  # Conventional commits
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--force]

  # Pytest - Run tests on changed files
  - repo: local
    hooks:
      - id: pytest-check
        name: pytest (changed files)
        entry: bash -c 'if git diff --cached --name-only | grep -q "^src/\|^tests/"; then pytest tests/ -x -q --tb=short --ignore=tests/test_llm_chat.py --ignore=tests/test_llm_ratelimiter.py --ignore=tests/test_model_selection.py -k "not test_gateway_successful_request and not test_returns_json_response" || exit 1; fi'
        language: system
        pass_filenames: false
        always_run: false
        stages: [pre-push]

  # env schema validation
  - repo: local
    hooks:
      - id: validate-env-schema
        name: validate env schema vs .env.example
        entry: python3 scripts/validate_schema.py --warn-only
        language: system
        pass_filenames: false
        files: ^(config/env_schema\.yaml|\.env\.example)$

  # Security scanning (optional - can be slow)
  # Uncomment to enable Trivy in pre-commit (primarily runs in CI)
  # - repo: local
  #   hooks:
  #     - id: trivy-fs
  #       name: trivy filesystem scan
  #       entry: bash -c 'docker run --rm -v "$(pwd):/scan" aquasec/trivy fs --severity HIGH,CRITICAL --exit-code 1 /scan'
  #       language: system
  #       pass_filenames: false
  #       stages: [push]

# CI mode: Fail fast and don't modify files
ci:
  autofix_commit_msg: "style: auto-fix pre-commit hooks"
  autofix_prs: false
  autoupdate_schedule: quarterly
  skip: [mypy, validate-env-schema, pytest-check]
