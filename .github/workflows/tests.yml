name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: [self-hosted, macOS]

    steps:
      - uses: actions/checkout@v4

      - name: Set up virtualenv
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Lint with ruff
        run: |
          source .venv/bin/activate
          ruff check src/ tests/ --output-format=github

      - name: Run tests
        env:
          GOOGLE_API_KEY: ""
          LOCAL_LLM_ENABLED: "false"
          AGENTMAIL_API_KEY: ""
          AGENTMAIL_INBOX: ""
          MEMORY_DIR: /tmp/openclaw-test
          QMD_MEMORY_FILE: /tmp/openclaw-test/qmd.json
          SPENDING_FILE: /tmp/openclaw-test/spending.json
          CONFIG_DIR: ${{ github.workspace }}/config
        run: |
          source .venv/bin/activate
          python3 -m pytest tests/ -v --tb=short -k 'not test_gateway_successful_request and not test_model_selection' --cov=src --cov-report=xml --cov-report=term-missing:skip-covered

      - name: Check coverage threshold
        if: always()
        run: |
          source .venv/bin/activate
          python3 -m pytest tests/ -q -k 'not test_gateway_successful_request and not test_model_selection' --cov=src --cov-fail-under=40 2>/dev/null || echo "⚠️ Coverage below 40% threshold"
