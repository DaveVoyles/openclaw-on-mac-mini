name: Pre-commit Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Run Pre-commit Hooks
    runs-on: [self-hosted, macOS, ARM64, openclaw]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check changed markdown links
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          files=()
          while IFS= read -r file; do
            files+=("$file")
          done < <(git diff --name-only --diff-filter=ACMRT "origin/${{ github.base_ref }}"...HEAD -- '*.md')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No markdown changes detected."
            exit 0
          fi
          python scripts/check_markdown_links.py "${files[@]}"

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-

      - name: Run pre-commit hooks
        run: |
          pre-commit run --all-files --show-diff-on-failure

      - name: Comment on PR (if failed)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Pre-commit checks failed!**\n\nPlease run `./scripts/pre-commit-setup.sh` locally and fix the issues.\n\nYou can also run `pre-commit run --all-files` to see what needs to be fixed.'
            })

  conventional-commits:
    name: Check Commit Messages
    runs-on: [self-hosted, macOS, ARM64, openclaw]
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json

  security-scan:
    name: Quick Security Scan
    runs-on: [self-hosted, macOS, ARM64, openclaw]
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install bandit

      - name: Run Bandit security scan
        run: |
          bandit -r src/ -f json -o bandit-report.json || true
          
          # Check if there are high/medium severity issues
          if [ -f bandit-report.json ]; then
            HIGH=$(jq '[.results[] | select(.issue_severity=="HIGH")] | length' bandit-report.json)
            MEDIUM=$(jq '[.results[] | select(.issue_severity=="MEDIUM")] | length' bandit-report.json)
            
            echo "Security scan results:"
            echo "- High severity: $HIGH"
            echo "- Medium severity: $MEDIUM"
            
            if [ "$HIGH" -gt 0 ]; then
              echo "❌ High severity security issues found!"
              jq -r '.results[] | select(.issue_severity=="HIGH") | "- \(.test_id): \(.issue_text) in \(.filename):\(.line_number)"' bandit-report.json
              exit 1
            fi
          fi

      - name: Upload Bandit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-pr-scan
          path: bandit-report.json
          retention-days: 7
