name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
      - 'scripts/validate_schema.py'
      - 'scripts/update_slack_manifest.py'
      - 'scripts/check_slack_command_drift.py'
      - 'config/env_schema.yaml'
      - '.env.example'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
      - 'scripts/validate_schema.py'
      - 'scripts/update_slack_manifest.py'
      - 'scripts/check_slack_command_drift.py'
      - 'config/env_schema.yaml'
      - '.env.example'
  workflow_dispatch:  # Manual trigger — always runs full suite

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: [self-hosted, macOS, ARM64, openclaw]
    timeout-minutes: 45

    env:
      GOOGLE_API_KEY: ""
      LOCAL_LLM_ENABLED: "false"
      AGENTMAIL_API_KEY: ""
      AGENTMAIL_INBOX: ""
      MEMORY_DIR: /tmp/openclaw-test
      QMD_MEMORY_FILE: /tmp/openclaw-test/qmd.json
      SPENDING_FILE: /tmp/openclaw-test/spending.json
      CONFIG_DIR: ${{ github.workspace }}/config

    steps:
      - uses: actions/checkout@v4

      - name: Lint with ruff
        run: ruff check src/ tests/ --output-format=github

      - name: Check formatting
        run: ruff format src/ tests/ --check

      - name: Check Slack command drift
        run: python3 scripts/check_slack_command_drift.py

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up virtualenv
        run: |
          # Pin to Python 3.13: scipy 1.15 has no Python 3.14 wheels yet
          PYTHON_BIN="$(command -v python3.13 || command -v /opt/homebrew/opt/python@3.13/bin/python3.13 || command -v python3)"
          echo "Using $PYTHON_BIN ($($PYTHON_BIN --version))"
          # Recreate venv if it points to a different python (cached venv from older runs)
          if [ -d .venv ]; then
            VENV_VER="$(.venv/bin/python -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")' 2>/dev/null || echo none)"
            REQ_VER="$("$PYTHON_BIN" -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')"
            if [ "$VENV_VER" != "$REQ_VER" ]; then
              echo "Rebuilding venv: was $VENV_VER, want $REQ_VER"
              rm -rf .venv
            fi
          fi
          [ -d .venv ] || "$PYTHON_BIN" -m venv .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Cache ruff
        uses: actions/cache@v4
        with:
          path: .ruff_cache
          key: ruff-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: ruff-${{ runner.os }}-

      - name: Cache mypy
        uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'requirements.txt') }}
          restore-keys: mypy-${{ runner.os }}-

      - name: Cache pytest
        uses: actions/cache@v4
        with:
          path: .pytest_cache
          key: pytest-${{ runner.os }}-${{ hashFiles('requirements-test.txt') }}
          restore-keys: pytest-${{ runner.os }}-

      - name: Type check (strict enforcement)
        run: |
          source .venv/bin/activate
          python3 scripts/mypy_enforce.py

      - name: Type check full src (warnings only)
        continue-on-error: true
        run: |
          source .venv/bin/activate
          python3 -m mypy src/ --ignore-missing-imports --show-error-codes 2>&1 | tail -5

      - name: Python syntax check
        run: |
          source .venv/bin/activate
          python3 scripts/syntax_check.py

      - name: Validate env schema
        run: python3 scripts/validate_schema.py --warn-only

      - name: Quality eval smoke gate (offline)
        run: |
          source .venv/bin/activate
          python3 -m pytest tests/evals/test_offline_quality_eval.py -q -n 0 --tb=short

      - name: Smoke gate (fast critical-path check)
        run: |
          source .venv/bin/activate
          python3 -m pytest tests/ -m smoke -q --tb=short             -n auto --timeout=30             --ignore=tests/test_llm_chat.py             --ignore=tests/test_llm_ratelimiter.py             --ignore=tests/test_model_selection.py
          echo "✅ Smoke gate passed"

      - name: Run tests with coverage
        run: |
          mkdir -p "$MEMORY_DIR"
          source .venv/bin/activate
          python3 -m pytest tests/ -v --tb=short \
            -m "not expensive" \
            -k 'not (test_gateway_successful_request or test_run_chat_uses_router_before_generic_chat_fallback or test_run_chat_routed_edit_still_requests_approval or test_run_chat_autoroutes_plan_candidate or test_run_chat_supports_help_command or test_help_output_includes_new_commands or test_returns_html)' \
            --cov=src --cov-report=xml --cov-report=term-missing:skip-covered \
            --durations=10

      - name: Upload to codecov
        uses: codecov/codecov-action@v7
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Check coverage threshold
        if: always()
        run: |
          source .venv/bin/activate
          # Read the .coverage file from the previous step — no need to re-run 8k tests
          python3 -m coverage report --fail-under=30 2>/dev/null || echo "⚠️ Coverage below 30% threshold"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-macOS
          path: coverage.xml
          retention-days: 30

      - name: CI failure — troubleshooting guide
        if: failure()
        run: |
          echo "## ❌ CI Failed — Quick Troubleshooting" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Issue | Fix |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint/format | \`make lint-fix && git commit\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke test | \`make smoke-verbose\` to reproduce |" >> $GITHUB_STEP_SUMMARY
          echo "| Missing env | \`make validate-env\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Cache issue | Re-run job from GitHub UI |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Full guide: [docs/CI-TROUBLESHOOTING.md](docs/CI-TROUBLESHOOTING.md)" >> $GITHUB_STEP_SUMMARY

  deploy-cli:
    name: Deploy CLI to macbook
    needs: test
    runs-on: [self-hosted, macOS, ARM64, openclaw]
    # Only deploy on pushes to main (not PRs) and only when tests pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Deploy CLI files to macbook
        run: bash scripts/install_openclaw_cli_remote.sh macbook

      - name: Restart server container (picks up src/ bind mount)
        # force-recreate is required: `rm -f` cannot remove a running container
        # (the error is swallowed), so a plain `up -d` would see the unchanged
        # healthy container and skip recreation, never reloading new code.
        run: cd /Users/davevoyles/openclaw && docker-compose up -d --force-recreate --no-deps openclaw

      - name: Verify deployed version
        run: |
          ssh macbook 'python3 -c "
          import sys
          sys.path.insert(0, \"/Users/davevoyles/.local/share/openclaw-cli\")
          from openclaw_cli import cli_version, _CLI_BUILD
          print(\"✅ Deployed:\", cli_version())
          " 2>&1'
          LINE_COUNT=$(ssh macbook 'wc -l < /Users/davevoyles/.local/share/openclaw-cli/openclaw_cli.py | tr -d " "')
          echo "✅ Deployed openclaw_cli.py: ${LINE_COUNT} lines"
