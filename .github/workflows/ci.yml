name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:  # Manual trigger — always runs full suite

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: [self-hosted, macOS, ARM64, openclaw]
    timeout-minutes: 45

    env:
      GOOGLE_API_KEY: ""
      LOCAL_LLM_ENABLED: "false"
      AGENTMAIL_API_KEY: ""
      AGENTMAIL_INBOX: ""
      MEMORY_DIR: /tmp/openclaw-test
      QMD_MEMORY_FILE: /tmp/openclaw-test/qmd.json
      SPENDING_FILE: /tmp/openclaw-test/spending.json
      CONFIG_DIR: ${{ github.workspace }}/config

    steps:
      - uses: actions/checkout@v4

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up virtualenv
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Lint with ruff
        run: |
          source .venv/bin/activate
          ruff check src/ tests/ --output-format=github

      - name: Type check with mypy
        continue-on-error: true  # Warn only for now
        run: |
          source .venv/bin/activate
          pip install mypy
          mypy src/ --ignore-missing-imports || true

      - name: Python syntax check
        run: |
          source .venv/bin/activate
          python3 scripts/syntax_check.py

      - name: Quality eval smoke gate (offline)
        run: |
          source .venv/bin/activate
          python3 -m pytest tests/evals/test_offline_quality_eval.py -q -n 0 --tb=short

      - name: Run tests with coverage
        run: |
          mkdir -p "$MEMORY_DIR"
          source .venv/bin/activate
          python3 -m pytest tests/ -v --tb=short \
            --ignore=tests/test_llm_chat.py \
            --ignore=tests/test_llm_ratelimiter.py \
            --ignore=tests/test_model_selection.py \
            -k 'not (test_gateway_successful_request or test_run_chat_uses_router_before_generic_chat_fallback or test_run_chat_routed_edit_still_requests_approval or test_run_chat_autoroutes_plan_candidate or test_run_chat_supports_help_command or test_help_output_includes_new_commands or test_returns_html)' \
            --cov=src --cov-report=xml --cov-report=term-missing:skip-covered \
            --durations=10

      - name: Upload to codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Check coverage threshold
        if: always()
        run: |
          source .venv/bin/activate
          # Read the .coverage file from the previous step — no need to re-run 8k tests
          python3 -m coverage report --fail-under=30 2>/dev/null || echo "⚠️ Coverage below 30% threshold"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-macOS
          path: coverage.xml
          retention-days: 30

  deploy-cli:
    name: Deploy CLI to macbook
    needs: test
    runs-on: [self-hosted, macOS, ARM64, openclaw]
    # Only deploy on pushes to main (not PRs) and only when tests pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Deploy CLI files to macbook
        run: bash scripts/install_openclaw_cli_remote.sh macbook

      - name: Restart server container (picks up src/ bind mount)
        run: cd /Users/davevoyles/openclaw && docker-compose rm -f openclaw 2>/dev/null || true && docker-compose up -d openclaw

      - name: Verify deployed version
        run: |
          ssh macbook 'python3 -c "
          import sys
          sys.path.insert(0, \"/Users/davevoyles/.local/share/openclaw-cli\")
          from openclaw_cli import cli_version, _CLI_BUILD
          print(\"✅ Deployed:\", cli_version())
          " 2>&1'
          LINE_COUNT=$(ssh macbook 'wc -l < /Users/davevoyles/.local/share/openclaw-cli/openclaw_cli.py | tr -d " "')
          echo "✅ Deployed openclaw_cli.py: ${LINE_COUNT} lines"
