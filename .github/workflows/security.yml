name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly security scan on Mondays at 3 AM UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read
  security-events: write  # For uploading SARIF results
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy-docker:
    name: Trivy - Docker Image Scan
    runs-on: [self-hosted, macOS, ARM64, openclaw]
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t openclaw:security-scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'openclaw:security-scan'
          format: 'sarif'
          output: 'trivy-docker-results.sarif'
          severity: 'CRITICAL,HIGH'
          # Keep security visibility in SARIF/artifacts, but do not hard-fail
          # the workflow on findings while remediation is tracked separately.
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        if: always()
        with:
          sarif_file: 'trivy-docker-results.sarif'
          category: 'trivy-docker'

      - name: Run Trivy vulnerability scanner (JSON)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: 'openclaw:security-scan'
          format: 'json'
          output: 'trivy-docker-results.json'
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'

      - name: Upload Docker scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-docker-results
          path: |
            trivy-docker-results.sarif
            trivy-docker-results.json
          retention-days: 30

  trivy-fs:
    name: Trivy - Filesystem Scan
    runs-on: [self-hosted, macOS, ARM64, openclaw]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'
          # Keep security visibility in SARIF/artifacts, but do not hard-fail
          # the workflow on findings while remediation is tracked separately.
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-filesystem'

      - name: Run Trivy vulnerability scanner (JSON)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-fs-results.json'
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'

      - name: Upload filesystem scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-fs-results
          path: |
            trivy-fs-results.sarif
            trivy-fs-results.json
          retention-days: 30

  trivy-config:
    name: Trivy - Config Scan
    runs-on: [self-hosted, macOS, ARM64, openclaw]
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy config scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-config-results.sarif'
          exit-code: '0'  # Don't fail on config issues (informational)

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        if: always()
        with:
          sarif_file: 'trivy-config-results.sarif'
          category: 'trivy-config'

      - name: Upload config scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-config-results
          path: trivy-config-results.sarif
          retention-days: 30

  dependency-review:
    name: Dependency Review
    runs-on: [self-hosted, macOS, ARM64, openclaw]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, Python-2.0

  security-report:
    name: Generate Security Report
    runs-on: [self-hosted, macOS, ARM64, openclaw]
    needs: [trivy-docker, trivy-fs, trivy-config]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: security-reports

      - name: Generate summary report
        run: |
          echo "# 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check if JSON results exist and parse them
          if [ -f "security-reports/trivy-docker-results/trivy-docker-results.json" ]; then
            echo "## Docker Image Vulnerabilities" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' security-reports/trivy-docker-results/trivy-docker-results.json || echo "0")
            HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' security-reports/trivy-docker-results/trivy-docker-results.json || echo "0")
            MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' security-reports/trivy-docker-results/trivy-docker-results.json || echo "0")
            LOW=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="LOW")] | length' security-reports/trivy-docker-results/trivy-docker-results.json || echo "0")
            
            echo "- 🔴 **Critical:** $CRITICAL" >> $GITHUB_STEP_SUMMARY
            echo "- 🟠 **High:** $HIGH" >> $GITHUB_STEP_SUMMARY
            echo "- 🟡 **Medium:** $MEDIUM" >> $GITHUB_STEP_SUMMARY
            echo "- 🟢 **Low:** $LOW" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "security-reports/trivy-fs-results/trivy-fs-results.json" ]; then
            echo "## Filesystem/Dependency Vulnerabilities" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' security-reports/trivy-fs-results/trivy-fs-results.json || echo "0")
            HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' security-reports/trivy-fs-results/trivy-fs-results.json || echo "0")
            MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' security-reports/trivy-fs-results/trivy-fs-results.json || echo "0")
            LOW=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="LOW")] | length' security-reports/trivy-fs-results/trivy-fs-results.json || echo "0")
            
            echo "- 🔴 **Critical:** $CRITICAL" >> $GITHUB_STEP_SUMMARY
            echo "- 🟠 **High:** $HIGH" >> $GITHUB_STEP_SUMMARY
            echo "- 🟡 **Medium:** $MEDIUM" >> $GITHUB_STEP_SUMMARY
            echo "- 🟢 **Low:** $LOW" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "📊 Full reports available in workflow artifacts" >> $GITHUB_STEP_SUMMARY

      - name: Upload consolidated report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report-summary
          path: security-reports/
          retention-days: 90
