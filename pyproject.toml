[project]
name = "openclaw"
version = "0.6.0"
description = "Autonomous AI Discord bot for home automation, media management, and system monitoring"
license = "MIT"
authors = [
    { name = "Dave Voyles" },
]
keywords = ["discord", "bot", "ai", "home-automation", "media-server"]
requires-python = ">=3.12"
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python :: 3.12",
    "Framework :: AsyncIO",
    "Topic :: Communications :: Chat",
    "Topic :: Home Automation",
]

[tool.pytest.ini_options]
# Discover tests in the tests/ directory
testpaths = ["tests"]

# Add src/ and project root to Python path so test imports resolve
pythonpath = ["src", "."]

# Use asyncio as the default event loop for pytest-asyncio
asyncio_mode = "auto"

# Short output, stop on first failure (-x), show extra summary
addopts = "-v --tb=short --timeout=30"

# Custom markers
markers = [
    "requires_python312: test requires Python 3.12 (run via ./run_tests.sh)",
]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]  # line length handled by formatter

[tool.ruff.lint.isort]
known-first-party = ["skills"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
