# OpenClaw Configuration
# Phase 1: Foundation

version: "0.5.0"
phase: 5

# Bot settings
bot:
  name: "OpenClaw"
  prefix: "/"
  status: "Watching Mac Mini"
  health_port: 8765

# LLM settings (Phase 3)
llm:
  primary_model: "gemini-2.5-flash"
  fallback_model: "gpt-4o-mini"
  max_tokens: 2000
  temperature: 0.7
  max_tool_rounds: 5
  rate_limits:
    per_minute: 60
    per_hour: 500
  conversation:
    ttl_minutes: 30
    max_history: 20

# Local LLM (Ollama) — hybrid routing
local_llm:
  enabled: true # set LOCAL_LLM_ENABLED=false in .env to disable
  model: "llama3.2:3b" # override with OLLAMA_MODEL env var
  url: "http://host.docker.internal:11434" # override with OLLAMA_URL env var
  # Queries containing these keywords bypass Ollama and go straight to Gemini
  # (because they need function/tool calling)
  tool_routed_to_gemini:
    - restart, container, docker, logs, status, health
    - download, queue, sonarr, radarr, plex, sabnzbd
    - network, tailscale, speedtest, report, analyze, spending

# Security settings
security:
  sandbox_mode: true
  require_approval: true
  audit_logging: true
  max_commands_per_minute: 10
  max_llm_calls_per_hour: 100

# Docker stack reference (Phase 2)
docker_stack:
  path: "/Users/davevoyles/docker-stack"
  host: "192.168.1.93"

# NAS reference (Phase 2)
nas:
  host: "192.168.1.8"
  ssh_port: 24
  user: "dave"
  docker_path: "/volume1/docker"

# Channel roles — prevents context bleed between different workflows.
# Set the matching env vars (DISCORD_CHANNEL_<ROLE>_ID) in .env with real IDs.
# Each channel gets a prompt override injected at conversation start so the
# bot behaves consistently with the channel's purpose.
channels:
  roles:
    research:
      prompt_override: >-
        You are a focused research assistant operating in the #research channel.
        Prioritize factual accuracy, cite all sources, and structure responses
        as formal research reports with clear headers and bullet points.
    analytics:
      prompt_override: >-
        You are a data analyst operating in the #analytics channel.
        Focus on metrics, trends, and structured analysis of system performance
        data. Use tables and ranked lists. Be concise and numbers-driven.
    bookmarks:
      prompt_override: >-
        You are a knowledge organizer operating in the #bookmarks channel.
        When given a URL or topic, extract the key information and confirm
        what was saved to the vault. Keep responses brief and structured.

# Obsidian vault settings
vault:
  dir: "/vault" # Docker volume mount point — matches VAULT_DIR env var
  index_hour: 3 # Hour for nightly vault-to-QMD indexing (3:50 AM)
  index_minute: 50
