# OpenClaw Configuration
# Phase 1: Foundation

version: "0.6.0"
phase: 5

# Bot settings
bot:
  name: "OpenClaw"
  prefix: "/"
  status: "Watching Mac Mini"
  health_port: 8765

# LLM settings (Phase 3)
llm:
  primary_model: "gemini-2.5-flash"
  fallback_model: "gpt-4o-mini"
  routing_profile: "copilot-first" # copilot-first | balanced | gemini-first | cost-saver
  # copilot_proxy_url: ""  # Set COPILOT_PROXY_URL env var to route through Copilot proxy
  max_tokens: 4096
  temperature: 0.7
  max_tool_rounds: 12
  rate_limits:
    per_minute: 60
    per_hour: 500
  conversation:
    ttl_minutes: 60
    max_history: 50

# Local LLM (Ollama) — hybrid routing
local_llm:
  enabled: true # set LOCAL_LLM_ENABLED=false in .env to disable
  model: "qwen3:8b" # override with OLLAMA_MODEL env var
  url: "http://host.docker.internal:11434" # override with OLLAMA_URL env var
  default_preference: "auto" # auto | local | gemini — override with DEFAULT_MODEL_PREFERENCE env var
  tools_enabled: true   # enable native tool calling via Ollama /api/chat
  # Queries containing these keywords bypass Ollama and go straight to Gemini
  # (because they need function/tool calling)
  tool_routed_to_gemini:
    - restart, container, docker, logs, status, health
    - download, queue, sonarr, radarr, plex, sabnzbd
    - network, tailscale, speedtest, report, analyze, spending

# Security settings
security:
  sandbox_mode: true
  require_approval: true
  audit_logging: true
  max_commands_per_minute: 10
  max_llm_calls_per_hour: 100

# Docker stack reference (Phase 2)
docker_stack:
  path: "/Users/davevoyles/docker-stack"
  host: "192.168.1.93"

# NAS reference (Phase 2)
nas:
  host: "192.168.1.8"
  ssh_port: 24
  user: "dave"
  docker_path: "/volume1/docker"

# Network addresses — single source of truth for all IPs and ports
network:
  docker_host_ip: "192.168.1.93"     # Mac Mini M4
  nas_ip: "192.168.1.8"              # Synology DS920+
  nas_ssh_port: 24
  nas_ssh_user: "dave"
  plex_port: 32400
  ollama_port: 11434
  monstervision_port: 8766

# Channel roles — per-channel AI personas (currently disabled).
# Channels are used as organizational labels only; all channels behave generically.
# To re-enable: set roles_enabled: true and set the matching env vars in .env.
# Templates are preserved below for future use.
channels:
  roles_enabled: false  # set true to re-enable per-channel prompt injection
  roles:
    research:
      prompt_override: >-
        You are a focused research assistant operating in the #research channel.
        Prioritize factual accuracy, cite all sources, and structure responses
        as formal research reports with clear headers and bullet points.
    analytics:
      prompt_override: >-
        You are a data analyst operating in the #analytics channel.
        Focus on metrics, trends, and structured analysis of system performance
        data. Use tables and ranked lists. Be concise and numbers-driven.
    bookmarks:
      prompt_override: >-
        You are a knowledge organizer operating in the #bookmarks channel.
        When given a URL or topic, extract the key information and confirm
        what was saved to the vault. Keep responses brief and structured.
    real_estate:
      prompt_override: >-
        You are a real-estate research specialist operating in the #real-estate channel.
        Focus on property listings, market analysis, neighborhood data, school ratings,
        tax records, and comparable sales. Structure responses with clear property
        details, price history, and pros/cons. Use tables for comparisons.

        IMPORTANT — Source links and property URLs:
        - Always call `search_web` for current listings and data. Do NOT rely solely on training knowledge.
        - For every property mentioned, include a direct link to its Zillow or Redfin page: `[123 Main St — Zillow](https://zillow.com/...)`
        - Include the listing price, bed/bath count, square footage, and lot size when available.
        - If search results include image URLs or thumbnail URLs for properties, include them as: `[📸 Property Photo](https://url)`
        - End every response with a **Sources** section listing all URLs used.
        - When a search is blocked (403/429), construct the likely Zillow URL from the address: `https://www.zillow.com/homes/<address-slug>_rb/`

# Thread-based conversations
threads:
  auto_create: true        # Create threads for /ask responses in regular channels
  archive_minutes: 60      # Auto-archive after inactivity
  max_messages: 50         # Max messages before suggesting a new thread

# Obsidian vault settings
vault:
  dir: "/vault" # Docker volume mount point — matches VAULT_DIR env var
  index_hour: 3 # Hour for nightly vault-to-QMD indexing (3:50 AM)
  index_minute: 50

# Vector store settings (Phase 13A — semantic memory)
vector_store:
  enabled: true
  dir: "/memory/chromadb"
  similarity_threshold: 0.7  # minimum cosine similarity to return a result
  contextual_recall: true     # inject relevant memories before each LLM call
  contextual_top_k: 5         # max context items to inject per query
  embedding_model: ""          # Ollama model name (e.g. "embeddinggemma", "nomic-embed-text"). Empty = built-in MiniLM
  thresholds:
    # Similarity threshold for factual queries (who/what/when/where)
    factual: 0.75
    # Similarity threshold for conversational queries (explain/describe/tell me)
    conversational: 0.65
    # Default similarity threshold
    default: 0.70
    # Threshold above which two recalled memories are considered duplicates
    dedup: 0.90
  # Set to true to enable strict domain suppression (only recall on-topic memories)
  # Env var: RECALL_DOMAIN_GUARD_STRICT (default: false)
  recall_domain_guard_strict: false

# ---------------------------------------------------------------------------
# Alert & Notification Settings (W13)
# ---------------------------------------------------------------------------
alerting:
  # Seconds before the same alert can fire again (default: 3600 = 1 hour)
  cooldown_seconds: 3600
  # Seconds before a duplicate alert is suppressed (default: 1800 = 30 min)
  dedup_window_seconds: 1800
  # Seconds an alert is snoozed when owner reacts with ⏰ (default: 3600 = 1 hour)
  snooze_seconds: 3600
  # Discord user ID to DM for CRITICAL alerts (also reads OWNER_USER_ID / BOT_OWNER_ID env vars)
  owner_user_id: null

# ---------------------------------------------------------------------------
# Model Routing Settings (W9)
# ---------------------------------------------------------------------------
routing:
  # Providers with p95 latency above this threshold (ms) are skipped (default: 10000)
  latency_threshold_ms: 10000
  # Whether to include Anthropic Claude in tool-call routing (requires ANTHROPIC_API_KEY)
  anthropic_tools_enabled: true
  # Whether to include OpenAI GPT-4o in tool-call routing (requires OPENAI_API_KEY)
  openai_tools_enabled: true

# ---------------------------------------------------------------------------
# Background Task Settings (W10)
# ---------------------------------------------------------------------------
background_tasks:
  # Restart backoff delays in seconds: [first, second, third, fourth+]
  backoff_delays: [5, 15, 60, 300]
  # Minutes of clean operation before resetting backoff counter
  clean_window_minutes: 30
  # Number of active conversations before skipping optional background scans
  active_conversation_threshold: 3

# ---------------------------------------------------------------------------
# Quality Auto-Repair Settings (W11)
# ---------------------------------------------------------------------------
quality_repair:
  # Maximum number of repair attempts before falling back to original answer
  max_attempts: 2
  # Provider-specific timeouts for repair LLM calls (seconds)
  timeouts:
    copilot: 20
    gemini: 45
    ollama: 60

# ---------------------------------------------------------------------------
# Streaming Settings (W12)
# ---------------------------------------------------------------------------
streaming:
  # Enable Gemini streaming (requires testing; off by default)
  # Env var: GEMINI_STREAMING_ENABLED
  gemini_enabled: false
  # Number of chars to accumulate before sending a stream chunk to Discord
  # Env var: PROVIDER_STREAM_INTERVAL_CHARS
  interval_chars: 200
