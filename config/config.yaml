# OpenClaw Configuration
# Phase 1: Foundation

version: "0.6.0"
phase: 5

# Bot settings
bot:
  name: "OpenClaw"
  prefix: "/"
  status: "Watching Mac Mini"
  health_port: 8765

# LLM settings (Phase 3)
llm:
  primary_model: "gemini-2.5-flash"
  fallback_model: "gpt-4o-mini"
  max_tokens: 2000
  temperature: 0.7
  max_tool_rounds: 5
  rate_limits:
    per_minute: 60
    per_hour: 500
  conversation:
    ttl_minutes: 30
    max_history: 50

# Local LLM (Ollama) — hybrid routing
local_llm:
  enabled: true # set LOCAL_LLM_ENABLED=false in .env to disable
  model: "gemma3:12b" # override with OLLAMA_MODEL env var
  url: "http://host.docker.internal:11434" # override with OLLAMA_URL env var
  default_preference: "auto" # auto | local | gemini — override with DEFAULT_MODEL_PREFERENCE env var
  tools_enabled: false  # experimental: enable native tool calling via Ollama /api/chat
  # Queries containing these keywords bypass Ollama and go straight to Gemini
  # (because they need function/tool calling)
  tool_routed_to_gemini:
    - restart, container, docker, logs, status, health
    - download, queue, sonarr, radarr, plex, sabnzbd
    - network, tailscale, speedtest, report, analyze, spending

# Security settings
security:
  sandbox_mode: true
  require_approval: true
  audit_logging: true
  max_commands_per_minute: 10
  max_llm_calls_per_hour: 100

# Docker stack reference (Phase 2)
docker_stack:
  path: "/Users/davevoyles/docker-stack"
  host: "192.168.1.93"

# NAS reference (Phase 2)
nas:
  host: "192.168.1.8"
  ssh_port: 24
  user: "dave"
  docker_path: "/volume1/docker"

# Channel roles — prevents context bleed between different workflows.
# Set the matching env vars (DISCORD_CHANNEL_<ROLE>_ID) in .env with real IDs.
# Each channel gets a prompt override injected at conversation start so the
# bot behaves consistently with the channel's purpose.
channels:
  roles:
    research:
      prompt_override: >-
        You are a focused research assistant operating in the #research channel.
        Prioritize factual accuracy, cite all sources, and structure responses
        as formal research reports with clear headers and bullet points.
    analytics:
      prompt_override: >-
        You are a data analyst operating in the #analytics channel.
        Focus on metrics, trends, and structured analysis of system performance
        data. Use tables and ranked lists. Be concise and numbers-driven.
    bookmarks:
      prompt_override: >-
        You are a knowledge organizer operating in the #bookmarks channel.
        When given a URL or topic, extract the key information and confirm
        what was saved to the vault. Keep responses brief and structured.
    real_estate:
      prompt_override: >-
        You are a real-estate research specialist operating in the #real-estate channel.
        Focus on property listings, market analysis, neighborhood data, school ratings,
        tax records, and comparable sales. Structure responses with clear property
        details, price history, and pros/cons. Use tables for comparisons.

        IMPORTANT — Source links and property URLs:
        - Always call `search_web` for current listings and data. Do NOT rely solely on training knowledge.
        - For every property mentioned, include a direct link to its Zillow or Redfin page: `[123 Main St — Zillow](https://zillow.com/...)`
        - Include the listing price, bed/bath count, square footage, and lot size when available.
        - If search results include image URLs or thumbnail URLs for properties, include them as: `[📸 Property Photo](https://url)`
        - End every response with a **Sources** section listing all URLs used.
        - When a search is blocked (403/429), construct the likely Zillow URL from the address: `https://www.zillow.com/homes/<address-slug>_rb/`

# Obsidian vault settings
vault:
  dir: "/vault" # Docker volume mount point — matches VAULT_DIR env var
  index_hour: 3 # Hour for nightly vault-to-QMD indexing (3:50 AM)
  index_minute: 50

# Vector store settings (Phase 13A — semantic memory)
vector_store:
  enabled: true
  dir: "/memory/chromadb"
  similarity_threshold: 0.7  # minimum cosine similarity to return a result
  contextual_recall: true     # inject relevant memories before each LLM call
  contextual_top_k: 3         # max context items to inject per query
  embedding_model: ""          # Ollama model name (e.g. "embeddinggemma", "nomic-embed-text"). Empty = built-in MiniLM
