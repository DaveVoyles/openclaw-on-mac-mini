version: "3.9"

services:
  openclaw:
    build: .
    container_name: openclaw
    hostname: openclaw
    restart: always

    # Security hardening (consistent with docker-stack)
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true

    # Resource limits
    mem_limit: 2g
    cpus: "2.0"

    # Docker socket access requires matching the host's socket group (root/GID 0 on OrbStack)
    group_add:
      - "0"

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Port mappings
    ports:
      - "8765:8765" # Health check / Web UI / OpenAI-compat API
      - "8080:8080" # Upload server + OAuth callbacks (Dropbox /dropbox/callback)

    # Environment variables
    env_file:
      - .env

    environment:
      - PYTHONPATH=/app/src:/app/skills:/app
      - HEALTH_PORT=8765
      - LOG_DIR=/logs
      - AUDIT_DIR=/audit
      - MC_TASKS_FILE=/app/data/tasks.json
      - VAULT_DIR=/vault
      # Channel role IDs — set in .env with real Discord channel IDs
      - DISCORD_CHANNEL_RESEARCH_ID=${DISCORD_CHANNEL_RESEARCH_ID:-0}
      - DISCORD_CHANNEL_ANALYTICS_ID=${DISCORD_CHANNEL_ANALYTICS_ID:-0}
      - DISCORD_CHANNEL_BOOKMARKS_ID=${DISCORD_CHANNEL_BOOKMARKS_ID:-0}
      - DISCORD_CHANNEL_REAL_ESTATE_ID=${DISCORD_CHANNEL_REAL_ESTATE_ID:-0}
      - ALERT_CHANNEL_ID=${ALERT_CHANNEL_ID:-0}
      # NAS maintenance backup settings
      - NAS_HOST=${NAS_HOST:-192.168.1.8}
      - NAS_SSH_PORT=${NAS_SSH_PORT:-24}
      - NAS_SSH_USER=${NAS_SSH_USER:-dave}
      - NAS_BACKUP_PATH=${NAS_BACKUP_PATH:-/volume1/docker/openclaw/backups}
      - QBIT_URL=${QBIT_URL:-http://192.168.1.8:8080}
      - PLANS_DIR=/plans
      - SLACK_METRICS_PATH=/logs/slack_metrics.jsonl

    # Volume mounts
    volumes:
      # Docker socket access (OrbStack — symlinked from /var/run/docker.sock)
      - /var/run/docker.sock:/var/run/docker.sock:rw

      # Configuration (read-only)
      - ./config:/config:ro

      # Persistent data (read-write)
      - ./data/logs:/logs:rw
      - ./data/memory:/memory:rw
      - ./data/audit:/audit:rw
      - ./data/tasks.json:/app/data/tasks.json:rw

      # Slack bot state — writable files needed at runtime (read_only: true container)
      - ./data/known_files.json:/app/data/known_files.json:rw
      - ./data/digest_prefs.json:/app/data/digest_prefs.json:rw
      - ./data/last_sync.json:/app/data/last_sync.json:rw

      # Temp directories (required for read_only: true)
      - /tmp/openclaw:/tmp:rw

      # Cache directory (ChromaDB, onnxruntime, user profiles need writable cache)
      - /tmp/openclaw-cache:/home/openclaw/.cache:rw

      # SSH keys for NAS access (backup, health check, self-heal)
      # Set SSH_KEY_PATH and SSH_KNOWN_HOSTS in .env (see .env.example)
      - ${SSH_KEY_PATH:-~/.ssh/id_ed25519}:/home/openclaw/.ssh/id_ed25519:ro
      - ${SSH_KNOWN_HOSTS:-~/.ssh/known_hosts}:/home/openclaw/.ssh/known_hosts:ro

      # Audiobook library on NAS (read-only browse access for search queries)
      - /Users/davevoyles/mnt/Misc/audiobooks:/audiobooks:ro

      # Agent plans — persistent TODO/plan files for autonomous goal tracking
      - ./data/plans:/plans:rw

      # Obsidian vault — stores all research reports, bookmarks, and notes as .md files
      - ./data/vault:/vault:rw

      # Shared AI files — accessible to OpenClaw as /ai-files (rw: upload endpoint writes here)
      - /Users/davevoyles/ai-files:/ai-files:rw

      # Auto-Dream memory files (persistent cognitive memory)
      - ./data/dream:/app/data/dream:rw

      # ChromaDB vector store — semantic memory (Phase 13A)
      - ./data/chromadb:/memory/chromadb:rw

      # SQLite thread store (Phase 13B) — lives in /memory alongside other data
      # (openclaw.db is created automatically by thread_store.py)

      # Live CLI source — always serves the latest src/ files without a rebuild
      # This ensures /update and /cli-update/<file> always return the current version
      - ./src:/app/src:ro

      # Live skills — mounted so skills/__init__.py changes take effect without rebuild
      - ./skills:/app/skills:ro

      # Templates directory — mounted separately because src/templates is a symlink
      # to ../templates, which Docker bind mounts do not follow outside the src/ scope.
      # Without this mount the container uses the stale baked-in image copy.
      - ./templates:/app/templates:ro

      # Scripts directory — serves install scripts (/install, /install.ps1, etc.)
      - ./scripts:/app/scripts:ro

    # Health check
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Open WebUI — browser-based chat UI (OpenAI-compatible)
  # Connects to OpenClaw's /v1/ API at http://openclaw:8765/v1
  # Accessible at http://192.168.1.93:3000
  # ---------------------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      - openclaw

    ports:
      - "3000:8080"

    environment:
      # Point to OpenClaw's OpenAI-compatible API (Docker internal network)
      - OPENAI_API_BASE_URL=http://openclaw:8765/v1
      - OPENAI_API_KEY=openclaw
      # Enable auth (required for external access via Synology reverse proxy)
      - WEBUI_AUTH=True
      # Persistent secret key — keeps sessions valid across container restarts
      - WEBUI_SECRET_KEY=***REMOVED***
      # Disable Ollama (we're using OpenAI-compat only)
      - ENABLE_OLLAMA_API=False
      # Cookie settings for reverse proxy / cross-origin access
      - WEBUI_SESSION_COOKIE_SAME_SITE=lax
      - WEBUI_SESSION_COOKIE_SECURE=False

    volumes:
      - open-webui-data:/app/backend/data
      # Shared AI files — accessible to Open WebUI as /ai-files
      - /Users/davevoyles/ai-files:/ai-files:ro

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  open-webui-data:
