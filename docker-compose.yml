services:
  openclaw:
    build: .
    container_name: openclaw
    hostname: openclaw
    restart: always

    # Security hardening (consistent with docker-stack)
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true

    # Resource limits
    mem_limit: 2g
    cpus: "2.0"

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Port mappings
    ports:
      - "8765:8765" # Health check / Web UI

    # Environment variables
    env_file:
      - .env

    environment:
      - HEALTH_PORT=8765
      - LOG_DIR=/logs
      - AUDIT_DIR=/audit
      - MC_TASKS_FILE=/app/data/tasks.json
      - VAULT_DIR=/vault
      # Channel role IDs — set in .env with real Discord channel IDs
      - DISCORD_CHANNEL_RESEARCH_ID=${DISCORD_CHANNEL_RESEARCH_ID:-0}
      - DISCORD_CHANNEL_ANALYTICS_ID=${DISCORD_CHANNEL_ANALYTICS_ID:-0}
      - DISCORD_CHANNEL_BOOKMARKS_ID=${DISCORD_CHANNEL_BOOKMARKS_ID:-0}
      # NAS maintenance backup settings
      - NAS_HOST=192.168.1.8
      - NAS_SSH_PORT=24
      - NAS_SSH_USER=dave
      - NAS_BACKUP_PATH=/volume1/docker/openclaw/backups

    # Volume mounts
    volumes:
      # Docker socket access
      - /Users/davevoyles/.docker/run/docker.sock:/var/run/docker.sock:rw

      # Configuration (read-only)
      - ./config:/config:ro

      # Persistent data (read-write)
      - ./data/logs:/logs:rw
      - ./data/memory:/memory:rw
      - ./data/audit:/audit:rw
      - ./data/tasks.json:/app/data/tasks.json:rw

      # Temp directories (required for read_only: true)
      - /tmp/openclaw:/tmp:rw

      # Obsidian vault — stores all research reports, bookmarks, and notes as .md files
      - ./data/vault:/vault:rw

    # Health check
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
